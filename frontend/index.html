<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopBot — AI Shopping Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Auth Screen ───────────────────────────────────────────── -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-mark">◈</span>
        <span class="auth-logo-name">ShopBot</span>
      </div>
      <p class="auth-tagline">Your AI-powered shopping assistant</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create account</button>
      </div>

      <div class="auth-form" id="authForm">
        <div class="auth-field">
          <label class="auth-label">Username</label>
          <input
            class="auth-input"
            id="authUsername"
            type="text"
            placeholder="your_username"
            autocomplete="username"
            autocapitalize="none"
          />
        </div>
        <div class="auth-field">
          <label class="auth-label">Password</label>
          <input
            class="auth-input"
            id="authPassword"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <div class="auth-error" id="authError"></div>
        <button class="auth-submit" id="authSubmit" onclick="submitAuth()">
          <span id="authSubmitLabel">Sign in</span>
          <span class="auth-spinner" id="authSpinner" style="display:none">◌</span>
        </button>
      </div>

      <p class="auth-hint" id="authHint">
        New here? Switch to <a href="#" onclick="switchTab('register'); return false">Create account</a> — no email needed.
      </p>
    </div>
  </div>

  <!-- ── App Shell (hidden until auth) ────────────────────────── -->
  <div class="app-shell" id="appShell" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-icon">◈</span>
          <span class="brand-name">ShopBot</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New chat
        </button>
      </div>

      <div class="session-list" id="sessionList">
        <div class="session-loading" id="sessionLoading">Loading…</div>
      </div>

      <div class="sidebar-footer">
        <div class="user-pill" id="userPill">
          <span class="user-pill-avatar" id="userAvatar"></span>
          <span class="user-pill-name" id="userPillName"></span>
          <button class="logout-btn" onclick="logout()" title="Sign out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <main class="main" id="main">
      <!-- Topbar (mobile) -->
      <div class="topbar" id="topbar">
        <button class="topbar-menu" id="sidebarToggle" onclick="openSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title" id="topbarTitle">ShopBot</span>
        <button class="topbar-new" onclick="newChat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div class="chat-container">
        <!-- Messages -->
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <div class="welcome-glow"></div>
            <div class="welcome-icon">◈</div>
            <h1 class="welcome-title">ShopBot</h1>
            <p class="welcome-sub">Find exactly what you're looking for.</p>
            <div class="welcome-chips">
              <button class="chip" onclick="sendChip(this)">Vans shoes under 100</button>
              <button class="chip" onclick="sendChip(this)">Nintendo joystick</button>
              <button class="chip" onclick="sendChip(this)">Dinotrux</button>
            </div>
          </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator" style="display:none">
          <div class="typing-avatar">◈</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>

        <!-- Input bar -->
        <div class="input-bar">
          <textarea
            id="userInput"
            class="input-field"
            placeholder="Ask me anything about products…"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>window.SHOPIFY_STORE_DOMAIN = 'ecom-lckxu1iu.myshopify.com';</script>
  <script src="/static/app.js"></script>
</body>
</html>
