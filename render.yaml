services:
  - type: web
    name: shopify-agent
    runtime: python
    repo: https://github.com/krishnaverma001/shopify-agent
    plan: starter
    region: singapore
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: RENDER
        value: true
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SECRET_KEY
        sync: false